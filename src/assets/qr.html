<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp QR Listener</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e2e8f0;
    }

    .card {
      width: min(92vw, 480px);
      padding: 24px;
      border-radius: 16px;
      background: #111827;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .subtitle {
      margin: 0 0 20px;
      opacity: 0.85;
      font-size: 0.9rem;
    }

    #qrBox {
      width: min(88vw, 420px);
      min-height: min(88vw, 420px);
      margin: 0 auto;
      border-radius: 12px;
      background: #fff;
      display: grid;
      place-items: center;
      padding: 16px;
      box-sizing: border-box;
    }

    #qrcode,
    #qrImage {
      width: 100%;
      height: auto;
      display: none;
    }

    #qrcode {
      min-height: 100%;
    }

    #qrcode img,
    #qrcode canvas,
    #qrImage {
      display: block;
      width: 100% !important;
      height: auto !important;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .status {
      margin-top: 16px;
      font-size: 0.9rem;
    }

    code {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      opacity: 0.9;
      max-width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>WhatsApp QR</h1>
    <p class="subtitle">Listening for QR updates from WebSocket</p>

    <div id="qrBox">
      <div id="qrcode" aria-label="QR code"></div>
      <img id="qrImage" alt="QR code" />
    </div>

    <div class="status" id="status">Connecting...</div>
    <code id="wsUrl"></code>
  </main>

  <script src="https://davidshimjs.github.io/qrcodejs/qrcode.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const statusEl = document.getElementById('status')
    const wsUrlEl = document.getElementById('wsUrl')
    const qrcodeEl = document.getElementById('qrcode')
    const qrImage = document.getElementById('qrImage')
    const qrSize = 420
    let qrCodeInstance = null

    const urlParams = new URLSearchParams(window.location.search)
    const wsUrl = urlParams.get('ws') || `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`
    wsUrlEl.textContent = wsUrl

    function setStatus(text) {
      statusEl.textContent = text
    }

    function getQrData(payload) {
      if (!payload) return null
      if (typeof payload === 'string') return payload
      return payload.qr || payload.qrCode || payload.data || payload.payload || null
    }

    function ensureQrCodeInstance() {
      if (!qrCodeInstance) {
        qrCodeInstance = new QRCode(qrcodeEl, {
          text: ' ',
          width: qrSize,
          height: qrSize,
          colorDark: '#000000',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.H
        })
      }
    }

    function renderGeneratedQr(qrData) {
      ensureQrCodeInstance()
      qrCodeInstance.clear()
      qrCodeInstance.makeCode(String(qrData))
      qrImage.style.display = 'none'
      qrcodeEl.style.display = 'block'
    }

    function renderImageQr(qrData) {
      qrcodeEl.innerHTML = ''
      qrImage.style.display = 'block'
      qrcodeEl.style.display = 'none'
      qrImage.src = qrData
    }

    function renderQr(qrData) {
      if (!qrData) return

      if (typeof qrData === 'string' && qrData.startsWith('data:image')) {
        renderImageQr(qrData)
        return
      }

      renderGeneratedQr(qrData)
    }

    function connect() {
      setStatus('Connecting...')
      const socket = io(wsUrl)

      socket.on('wa:qr', (payload) => {
        const qrData = getQrData(payload)
        renderQr(qrData)
        setStatus('QR updated, please scan it with your WhatsApp app')
      })


      // socket.onopen = () => {
      //   setStatus('Connected. Waiting for QR data...')
      // }



      // socket.onerror = () => {
      //   setStatus('WebSocket error')
      // }

      // socket.onclose = () => {
      //   setStatus('Disconnected. Reconnecting in 2s...')
      //   setTimeout(connect, 2000)
      // }
    }

    connect()
  </script>
</body>

</html>
